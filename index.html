<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Market Research Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-gray-50 p-8 font-sans">
    <div class="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow-md border border-gray-100">
        <h1 class="text-3xl font-extrabold text-gray-900 mb-2">AI Multi-Agent Market Research Engine</h1>
        <p class="text-gray-500 mb-6">Enter a research topic below to activate the LangGraph multi-agent orchestration pipeline.</p>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Research Topic / Company Name</label>
                <input id="topic" type="text" placeholder="e.g., Electric Vehicles market growth in India" 
                       class="border border-gray-300 p-3 w-full rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
            </div>
            
            <button onclick="startResearch()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-3 rounded-lg shadow transition duration-200">
                Launch Agents
            </button>
        </div>

        <div id="status" class="mt-6 text-blue-600 font-medium hidden">
            <span class="inline-block animate-pulse">🕵️‍♂️ Agents are searching, analyzing data, and updating vector storage...</span>
        </div>
        
        <div id="report-container" class="mt-8 border-t border-gray-200 pt-6 hidden">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Final Compiled Market Report</h2>
            <div id="output" class="prose max-w-none text-gray-700 leading-relaxed space-y-3"></div>
        </div>
    </div>

    <script>
        async function startResearch() {
            const topicInput = document.getElementById('topic');
            const statusDiv = document.getElementById('status');
            const containerDiv = document.getElementById('report-container');
            const outputDiv = document.getElementById('output');

            const topic = topicInput.value.trim();
            if (!topic) {
                alert("Please enter a valid topic first!");
                return;
            }

            // Show active status indicator, hide past outputs
            statusDiv.classList.remove('hidden');
            containerDiv.classList.add('hidden');
            outputDiv.innerHTML = "";

            try {
                const res = await fetch("https://market-research-agent-2xdb.onrender.com/api/research", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ topic })
                });

                if (res.ok) {
                    const data = await res.json();
                    // Fallback support if payload structural keys differ
                    const rawMarkdown = data.report || data.generated_report || "";
                    
                    if (rawMarkdown) {
                        // Marked.js parses the markdown layout string perfectly into structured HTML elements
                        outputDiv.innerHTML = marked.parse(rawMarkdown);
                        containerDiv.classList.remove('hidden');
                    } else {
                        outputDiv.innerHTML = `<p class="text-yellow-600">The agents executed successfully, but returned an empty report asset container.</p>`;
                        containerDiv.classList.remove('hidden');
                    }
                } else {
                    alert(`Backend Engine Error: Received status code ${res.status} from Render server.`);
                }
            } catch (err) {
                alert(`Failed to connect to Render host: ${err.message}`);
            } finally {
                // Remove loading indicator when network cycle finishes
                statusDiv.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
